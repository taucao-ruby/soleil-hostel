name: "CI: OpenAPI Contract Lint"

# Lane 3 Batch 3.4: Spectral lint on the published OpenAPI spec.
# Purpose: detect contract drift / malformed spec before merge so the runtime
# and the documented contract cannot silently diverge.
#
# Non-negotiable gate: `--fail-severity=error` blocks PRs on genuine contract
# defects (missing schemas, duplicate operationIds, unresolved $refs, unsafe
# markdown in descriptions). Style warnings remain visible in the workflow
# log but do NOT block the gate — they can be addressed iteratively.
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "docs/api/openapi.yaml"
      - ".spectral.yaml"
      - ".github/workflows/contract-lint.yml"
      # Batch 4 / 3C: also trigger when the runtime contract surface changes,
      # not just the spec. Routes/controllers/requests/resources are the source
      # of contract drift the spec is meant to detect.
      - "backend/routes/**"
      - "backend/app/Http/Controllers/**"
      - "backend/app/Http/Requests/**"
      - "backend/app/Http/Resources/**"
      - "backend/database/migrations/**"
      - "backend/tests/Feature/Contracts/**"
      - "backend/composer.json"
      - "backend/composer.lock"
  push:
    branches: [main, dev]
    paths:
      - "docs/api/openapi.yaml"
      - ".spectral.yaml"
      - ".github/workflows/contract-lint.yml"
      - "backend/routes/**"
      - "backend/app/Http/Controllers/**"
      - "backend/app/Http/Requests/**"
      - "backend/app/Http/Resources/**"
      - "backend/database/migrations/**"
      - "backend/tests/Feature/Contracts/**"
      - "backend/composer.json"
      - "backend/composer.lock"

concurrency:
  group: contract-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"

jobs:
  spectral:
    name: Spectral OpenAPI Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The runtime enum-contract step boots a RefreshDatabase test, so this lane
    # needs a real PostgreSQL service (the suite is PostgreSQL-only — exclusion
    # constraints, btree_gist, triggers). Credentials mirror the backend-tests
    # job in tests.yml so both lanes provision the DB identically.
    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: testing
      DB_PASSWORD: password
      CACHE_DRIVER: array
      SESSION_DRIVER: array
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral-cli@6

      - name: Lint OpenAPI spec (fail on error severity)
        run: |
          spectral lint docs/api/openapi.yaml \
            --ruleset .spectral.yaml \
            --format pretty \
            --fail-severity error

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql
          tools: composer:v2
          coverage: none

      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Bootstrap backend test environment
        working-directory: ./backend
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan package:discover --ansi --env=testing

      - name: GATE-0 — PostgreSQL test DB readiness
        working-directory: ./backend
        run: php scripts/check-test-db.php

      - name: Migrate test database
        working-directory: ./backend
        run: php artisan migrate --env=testing --force

      - name: Verify OpenAPI runtime enum contract
        working-directory: ./backend
        run: php artisan test --filter=OpenApiEnumContractTest --env=testing
