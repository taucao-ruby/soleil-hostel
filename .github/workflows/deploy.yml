name: "CD: Build & Deploy"

# Deploy Pipeline — runs on push to main or manual trigger
# Requires CI tests to pass first via workflow_run
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  DOCKER_HUB_REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ========== BACKEND TESTS (gate before deploy) ==========
  backend-tests:
    name: Backend Tests (Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          tools: composer
          coverage: xdebug
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress
      - name: Setup Laravel environment
        working-directory: ./backend
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force
      - name: Run Tests
        working-directory: ./backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          php artisan test --parallel --processes=4

  # ========== FRONTEND BUILD ==========
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend — Type check (blocking gate)
        working-directory: ./frontend
        run: npx tsc --noEmit
      - name: Frontend — Unit tests (blocking gate)
        working-directory: ./frontend
        run: pnpm run test:unit
      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '/api' }}
          NODE_ENV: production
        run: pnpm run build
      - name: Lint
        working-directory: ./frontend
        run: pnpm run lint
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ========== E2E TESTS (tags/manual deploys) ==========
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress
      - name: Setup backend
        working-directory: ./backend
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright
        working-directory: ./frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Start backend server
        working-directory: ./backend
        run: php artisan serve --host=127.0.0.1 --port=8000 &
        env:
          APP_ENV: testing
      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build
      - name: Start frontend preview server
        working-directory: ./frontend
        run: pnpm run preview &
      - name: Run Playwright E2E tests
        working-directory: ./frontend
        run: pnpm exec playwright test --reporter=html,json
        env:
          PLAYWRIGHT_TEST_BASE_URL: "http://localhost:4173"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-videos
          path: frontend/test-results/
          retention-days: 7

  # ========== BUILD DOCKER IMAGE ==========
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
            ${{ env.DOCKER_HUB_REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/soleil-hostel
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:buildcache,mode=max

  # ========== SECURITY: Trivy Docker Scan ==========
  trivy-scan:
    name: Trivy Docker Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    # Non-blocking: Trivy may flag base-image CVEs outside our control.
    # Review SARIF results in GitHub Security tab; promote to blocking once baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ needs.docker-build.outputs.image-tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
          category: "trivy"

  # ========== DEPLOY: Zero-downtime ==========
  deploy:
    name: Deploy Zero-Downtime
    runs-on: ubuntu-latest
    needs: [docker-build, backend-tests, e2e-tests]
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: production
      url: https://soleilhotel.com
    steps:
      - uses: actions/checkout@v4
      - name: Setup deployment tools
        run: |
          sudo apt-get update && sudo apt-get install -y curl jq
      # F-04 hard gate (pre-flight): a tagged release MUST be able to run
      # database migrations. If DEPLOY_HOST is not configured, the SSH-based
      # migration step cannot execute and the application would go live with
      # stale schema (silent corruption / 5xx storm). Abort BEFORE any
      # provider deploy step ships code so we never reach a half-migrated
      # production state. workflow_dispatch is intentionally exempt: it is
      # operator-driven, and the operator is responsible for running
      # migrations out-of-band.
      - name: Migration prerequisite gate (tagged deploys)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "::error::F-04 deploy gate: DEPLOY_HOST secret is empty. Tagged release cannot guarantee database migrations will run. Aborting deploy."
            exit 1
          fi
          echo "F-04 deploy gate passed: DEPLOY_HOST configured; migrations will run during deploy."
      - name: Determine deployment target
        id: deploy-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          fi
      - name: Deploy to Forge
        if: ${{ secrets.FORGE_API_TOKEN != '' }}
        run: |
          curl -X POST https://forge.laravel.com/api/v1/servers/${{ secrets.FORGE_SERVER_ID }}/sites/${{ secrets.FORGE_SITE_ID }}/deployment/trigger \
            -H "Authorization: Bearer ${{ secrets.FORGE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"commit": "${{ github.sha }}", "branch": "${{ github.ref_name }}"}'
      - name: Deploy to Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"commit": "${{ github.sha }}", "branch": "${{ github.ref_name }}"}'
      - name: Deploy to Coolify
        if: ${{ secrets.COOLIFY_API_TOKEN != '' }}
        run: |
          curl -X POST https://coolify.io/api/v1/applications/${{ secrets.COOLIFY_APP_ID }}/deploy \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"git_commit": "${{ github.sha }}"}'
      # Only SSH-deploy when no managed-provider secret is present.
      # Otherwise Forge/Render/Coolify already deployed the same commit above
      # and a second deploy would overwrite with the same ref or race the provider.
      - name: Deploy via SSH
        if: ${{ secrets.DEPLOY_HOST != '' && secrets.FORGE_API_TOKEN == '' && secrets.RENDER_DEPLOY_HOOK == '' && secrets.COOLIFY_API_TOKEN == '' }}
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/soleil-hostel' }}
          DEPLOY_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          trap 'rm -f ~/.ssh/deploy_key' EXIT

          echo "Deploying ${DEPLOY_REF} to ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

          ssh -o StrictHostKeyChecking=accept-new \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=4 \
              -i ~/.ssh/deploy_key \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_REF='${DEPLOY_REF}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          if [ ! -d "${DEPLOY_PATH}/.git" ]; then
            echo "::error::DEPLOY_PATH=${DEPLOY_PATH} is not a git checkout — initialize it manually first." >&2
            exit 1
          fi

          cd "${DEPLOY_PATH}"
          echo "==> Fetching ${DEPLOY_REF}"
          git fetch --all --tags --prune
          git checkout --force "${DEPLOY_REF}"
          # Discard any accidental local changes on the server; deploy ref is authoritative.
          git reset --hard "${DEPLOY_REF}"

          cd backend
          echo "==> Installing PHP dependencies"
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

          echo "==> Rebuilding Laravel caches"
          php artisan config:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          echo "==> Reloading services (best-effort; require passwordless sudo entries)"
          sudo -n systemctl reload php8.3-fpm 2>/dev/null \
            || sudo -n systemctl reload php-fpm 2>/dev/null \
            || echo "::warning::PHP-FPM reload skipped (no reloadable unit or sudo rule)"
          sudo -n systemctl restart supervisor 2>/dev/null \
            || echo "::warning::supervisor restart skipped (not installed or no sudo rule)"

          echo "==> Signaling queue workers to restart"
          php artisan queue:restart

          echo "==> SSH deploy of ${DEPLOY_REF} complete"
          REMOTE_SCRIPT
      # ─────────────────────────────────────────────────────────────────────
      # Lane 3 Batch 3.3: Migration ordering fix.
      #
      # Migrations MUST run before the Health Check step, not after it.
      #
      # Prior ordering ran migrations LAST — after health check and cache
      # warmup had already confirmed the new release was serving live
      # traffic. Consequences:
      #   - The new application code was live against the OLD database
      #     schema during the health-check window. Any new query that
      #     references a new column/table would 5xx until migrations
      #     completed, silently breaking real user traffic while CI
      #     reported success.
      #   - A migration that failed (constraint violation, lock timeout)
      #     would leave the new release LIVE with a partial/old schema
      #     and no automatic rollback — the deploy job would fail but
      #     production was already serving broken queries.
      #   - Cache warmup against the old schema could persist stale
      #     cache entries that outlived the migration.
      #
      # New ordering:
      #   Deploy code (Forge/Render/Coolify/SSH)
      #     → Run database migrations    ← must finish before traffic
      #     → Health Check               ← validates post-migration state
      #     → Warm up cache              ← persists correct cache shape
      #
      # Provider-managed deploy paths (Forge, Render, Coolify) already
      # handle migrations inside their own hook; running `artisan migrate`
      # via SSH afterwards is idempotent (Laravel tracks applied
      # migrations), so the new ordering is safe regardless of which
      # deploy method is configured. If migrations fail here, Health
      # Check will never run and the deploy job fails fast instead of
      # masking a half-migrated production.
      #
      # F-04 note: the previous "Migration skipped (no SSH credentials)"
      # soft-notice step was removed at F-04 remediation time because it
      # silently allowed tagged deploys to proceed with no schema migration.
      # The pre-flight "Migration prerequisite gate" step at the start of
      # this job hard-fails the workflow before any code is shipped when
      # DEPLOY_HOST is missing on a tagged release, so the legacy
      # "no SSH" branch is unreachable for tagged deploys.
      # ─────────────────────────────────────────────────────────────────────
      - name: Run database migrations
        if: startsWith(github.ref, 'refs/tags/v') && secrets.DEPLOY_HOST != ''
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/soleil-hostel' }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH}/backend && php artisan migrate --force --no-interaction"
          rm -f ~/.ssh/deploy_key
      - name: Health Check
        run: |
          APP_URL="${{ vars.APP_URL || 'https://soleilhotel.com' }}"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/health")
            if [ "$STATUS" = "200" ]; then echo "Health check passed"; exit 0; fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1
      - name: Warm up cache post-deploy
        run: |
          APP_URL="${{ vars.APP_URL || 'https://soleilhotel.com' }}"
          curl -X POST "${APP_URL}/api/cache/warmup" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_API_TOKEN }}" \
            -H "Content-Type: application/json" || true
      - name: Slack notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "✅ Soleil Hostel deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Deployment Successful*\n*Commit*: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Branch*: ${{ github.ref_name }}\n*Environment*: ${{ steps.deploy-target.outputs.environment }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
      - name: Slack notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ Soleil Hostel deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Deployment Failed*\n*Commit*: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Branch*: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ========== SEMANTIC RELEASE ==========
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v3
        with:
          semantic_version: 21
          branches: |
            [
              '+([0-9])?(.{+([0-9]),x}).x',
              'main',
              {name: 'hotfix/*', prerelease: 'hotfix', channel: 'hotfix'}
            ]
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== CLEANUP ==========
  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy]
    timeout-minutes: 5
    steps:
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: |
            frontend-dist
            backend-coverage
            playwright-report
            e2e-videos
          minCreatedAge: 7d
