name: "CI: E2E Smoke (Playwright)"

# Two execution modes:
#   - PR/merge gate: every pull_request targeting main or dev runs ONLY the
#     `@smoke` flows (guest-booking + payment-webhook). Failure blocks merge.
#     Target wall-clock under 3 minutes including bootstrap.
#   - Nightly + manual: workflow_dispatch and the scheduled job exercise the
#     full Playwright suite. Flaky non-smoke flows live there until their
#     14-day flake rate falls under 2%, at which point they earn a @smoke tag.

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      grep:
        description: 'Playwright --grep filter (default: full suite)'
        required: false
        default: ''
  schedule:
    # 02:00 UTC daily — full suite, gives engineers a morning signal on
    # non-smoke flow flakiness without blocking PRs in the meantime.
    - cron: '0 2 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  PHP_VERSION: "8.3"

jobs:
  smoke:
    name: E2E @smoke (PR-required)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 8 # Smoke target is < 3 min; the cap absorbs occasional bootstrap drag.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      # ---- Backend bootstrap ----
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql,gd,bcmath,mbstring,openssl,tokenizer,xml
      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Bootstrap testing environment
        working-directory: ./backend
        env:
          # APP_ENV=testing flips StripeService::shouldUseTestingFake() on, so the
          # booking flow gets a fake PaymentIntent (no Stripe key needed in CI).
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          # Webhook secret the BACKEND verifies against. MUST equal the value the
          # Playwright step signs with (STRIPE_WEBHOOK_SECRET, below) — the
          # controller verifies the signature, so a mismatch or empty secret
          # rejects payment_intent.succeeded and the webhook smoke flow fails.
          STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"
          # The booking-confirmation email is dispatched afterCommit and, under
          # QUEUE_CONNECTION=sync, sends inline inside the webhook request. Route
          # it to the log driver so the placeholder SMTP transport in .env.example
          # can't throw and turn a confirmed booking into a 500 webhook response.
          MAIL_MAILER: log
          # E2E-only: disable auth/booking rate limiting so the 4-project nightly
          # (one runner IP + the single seeded user) doesn't trip the 5/min-per-email
          # + 20/min-per-IP login limits. Honored only when not production —
          # RateLimiterServiceProvider double-gates; `php artisan test` never sets it.
          DISABLE_RATE_LIMITING: "true"
          # Raise the per-user pending-booking cap (config bookings.max_pending_per_user,
          # default 2): the smoke flows create several pending bookings as the single
          # seeded user across projects + retries without paying, so the default trips a
          # PENDING_LIMIT_EXCEEDED 422 on the 3rd. `php artisan test` overrides this per-test.
          BOOKING_MAX_PENDING_PER_USER: "1000"
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          # Seed a verified guest (user@soleil.test / P@ssworD!123) + bookable rooms
          # for the @smoke guest-booking flow.
          php artisan db:seed --class=DevRolePreviewSeeder --force
      - name: Start backend (background)
        working-directory: ./backend
        env:
          # APP_ENV=testing flips StripeService::shouldUseTestingFake() on, so the
          # booking flow gets a fake PaymentIntent (no Stripe key needed in CI).
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          # Webhook secret the BACKEND verifies against. MUST equal the value the
          # Playwright step signs with (STRIPE_WEBHOOK_SECRET, below) — the
          # controller verifies the signature, so a mismatch or empty secret
          # rejects payment_intent.succeeded and the webhook smoke flow fails.
          STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"
          # The booking-confirmation email is dispatched afterCommit and, under
          # QUEUE_CONNECTION=sync, sends inline inside the webhook request. Route
          # it to the log driver so the placeholder SMTP transport in .env.example
          # can't throw and turn a confirmed booking into a 500 webhook response.
          MAIL_MAILER: log
          # E2E-only: disable auth/booking rate limiting so the 4-project nightly
          # (one runner IP + the single seeded user) doesn't trip the 5/min-per-email
          # + 20/min-per-IP login limits. Honored only when not production —
          # RateLimiterServiceProvider double-gates; `php artisan test` never sets it.
          DISABLE_RATE_LIMITING: "true"
          # Raise the per-user pending-booking cap (config bookings.max_pending_per_user,
          # default 2): the smoke flows create several pending bookings as the single
          # seeded user across projects + retries without paying, so the default trips a
          # PENDING_LIMIT_EXCEEDED 422 on the 3rd. `php artisan test` overrides this per-test.
          BOOKING_MAX_PENDING_PER_USER: "1000"
        run: |
          # Fork 4 built-in-server workers so the SPA's parallel API calls and
          # the payment-webhook POST are served concurrently (like prod php-fpm)
          # instead of being serialized by one worker. --no-reload is REQUIRED:
          # ServeCommand ignores PHP_CLI_SERVER_WORKERS and forks a single
          # worker unless reloading is disabled.
          PHP_CLI_SERVER_WORKERS=4 php artisan serve --host=127.0.0.1 --port=8000 --no-reload &
          # Wait until /up returns 200 instead of a fixed sleep — saves wall-clock
          # on warm runners and avoids race on cold ones.
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/up >/dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      # ---- Frontend bootstrap ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend (preview-mode artifact)
        working-directory: ./frontend
        env:
          # Relative /api so the built SPA is SAME-ORIGIN with the API: `vite
          # preview` proxies /api -> the backend (frontend/vite.config.ts
          # preview.proxy). A cross-port absolute URL (:4173 -> :8000) made the
          # httpOnly auth cookie flaky, notably under Chrome mobile emulation.
          VITE_API_URL: "/api"
          # No VITE_STRIPE_PUBLISHABLE_KEY on purpose: the testing-mode backend
          # returns a deterministic fake PaymentIntent whose client_secret
          # (pi_test_{id}_{hash}_secret_test) is NOT Stripe's required
          # ${id}_secret_${secret} format, so real Stripe Elements throws on mount
          # and crashes the booking page. Without the key BookingForm stops at a
          # graceful "payment gateway not configured" state AFTER the booking is
          # created — and guest-booking.spec.ts asserts that booking-created step.
          # Payment confirmation is owned by payment-webhook.spec.ts (API layer).
          NODE_ENV: production
        run: pnpm run build

      # ---- Playwright bootstrap ----
      # Only install the chromium browser binary; smoke flows do not need
      # firefox / webkit / mobile-Pixel and they double the install time.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
      - name: Install Playwright (chromium only)
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      # ---- Run smoke flows ----
      - name: Playwright @smoke
        working-directory: ./frontend
        env:
          CI: 'true'
          E2E_API_BASE: "http://127.0.0.1:8000/api"
          STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"
          # Make Playwright's JSON reporter write to a file (CLI --reporter would
          # otherwise send it to stdout). Feeds the flake pipeline below.
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json
        run: npx playwright test --grep @smoke --project=chromium --reporter=line,github,json

      # ---- Flake tracking (D-2): observe + enforce the @smoke flake rule ----
      # Report against the committed 14-day history PLUS this PR run (the PR data
      # point is NOT committed — only the nightly full run accumulates history).
      - name: Flake report + PR summary
        if: always()
        working-directory: ./frontend
        run: |
          cp tests/e2e/flake-history.ndjson /tmp/flake.ndjson 2>/dev/null || touch /tmp/flake.ndjson
          node scripts/flake/ingest.mjs --file test-results/results.json \
            --commit "${{ github.sha }}" --branch "${{ github.head_ref || github.ref_name }}" \
            --ledger /tmp/flake.ndjson || true
          node scripts/flake/report.mjs --ledger /tmp/flake.ndjson --out flake-report.json --html flake-report.html
          {
            echo "### E2E flake rate (14d rolling)"
            echo ""
            echo "| Flow | Flake rate | Runs (14d) | Status |"
            echo "|------|------------|------------|--------|"
            jq -r '.flows[] | "| \(.flow_group) | \(.flow_flake_rate*100|floor)% | \(.total_runs) | \(.smoke_status) |"' flake-report.json
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload flake report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-report-${{ github.run_id }}
          path: frontend/flake-report.*
          retention-days: 14
      # Blocking: fails the PR when a currently-@smoke flow has a 7d flake_rate
      # >= 5% over the committed history. Runs LAST so artifacts upload first.
      - name: Smoke flake gate (blocking)
        if: always()
        working-directory: ./frontend
        run: node scripts/flake/gate.mjs --report flake-report.json

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7

  full:
    name: E2E full suite (nightly / dispatch)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Nightly accumulates the flake ledger and commits it back to dev [skip ci].
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql,gd,bcmath,mbstring,openssl,tokenizer,xml
      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Bootstrap testing environment
        working-directory: ./backend
        env:
          # APP_ENV=testing flips StripeService::shouldUseTestingFake() on, so the
          # booking flow gets a fake PaymentIntent (no Stripe key needed in CI).
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          # Webhook secret the BACKEND verifies against. MUST equal the value the
          # Playwright step signs with (STRIPE_WEBHOOK_SECRET, below) — the
          # controller verifies the signature, so a mismatch or empty secret
          # rejects payment_intent.succeeded and the webhook smoke flow fails.
          STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"
          # The booking-confirmation email is dispatched afterCommit and, under
          # QUEUE_CONNECTION=sync, sends inline inside the webhook request. Route
          # it to the log driver so the placeholder SMTP transport in .env.example
          # can't throw and turn a confirmed booking into a 500 webhook response.
          MAIL_MAILER: log
          # E2E-only: disable auth/booking rate limiting so the 4-project nightly
          # (one runner IP + the single seeded user) doesn't trip the 5/min-per-email
          # + 20/min-per-IP login limits. Honored only when not production —
          # RateLimiterServiceProvider double-gates; `php artisan test` never sets it.
          DISABLE_RATE_LIMITING: "true"
          # Raise the per-user pending-booking cap (config bookings.max_pending_per_user,
          # default 2): the smoke flows create several pending bookings as the single
          # seeded user across projects + retries without paying, so the default trips a
          # PENDING_LIMIT_EXCEEDED 422 on the 3rd. `php artisan test` overrides this per-test.
          BOOKING_MAX_PENDING_PER_USER: "1000"
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          # Seed a verified guest (user@soleil.test / P@ssworD!123) + bookable rooms
          # for the @smoke guest-booking flow.
          php artisan db:seed --class=DevRolePreviewSeeder --force
          # Fork 4 built-in-server workers so browser-driven concurrent requests
          # are served in parallel (like prod php-fpm). --no-reload is REQUIRED:
          # ServeCommand ignores PHP_CLI_SERVER_WORKERS and forks a single
          # worker unless reloading is disabled.
          PHP_CLI_SERVER_WORKERS=4 php artisan serve --host=127.0.0.1 --port=8000 --no-reload &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/up >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: ./frontend
        env:
          # Relative /api so the built SPA is SAME-ORIGIN with the API: `vite
          # preview` proxies /api -> the backend (frontend/vite.config.ts
          # preview.proxy). A cross-port absolute URL (:4173 -> :8000) made the
          # httpOnly auth cookie flaky, notably under Chrome mobile emulation.
          VITE_API_URL: "/api"
          # No VITE_STRIPE_PUBLISHABLE_KEY on purpose — see the smoke job's build
          # step: the testing-mode fake client_secret is not Stripe-format-valid,
          # so real Stripe Elements would crash the booking page on mount.
          NODE_ENV: production
        run: pnpm run build
      - name: Install Playwright (all browsers)
        working-directory: ./frontend
        run: npx playwright install --with-deps
      - name: Playwright full suite
        working-directory: ./frontend
        env:
          CI: 'true'
          E2E_API_BASE: "http://127.0.0.1:8000/api"
          STRIPE_WEBHOOK_SECRET: "whsec_e2e_test_secret"
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json
        run: |
          GREP="${{ github.event.inputs.grep }}"
          if [ -n "$GREP" ]; then
            npx playwright test --grep "$GREP" --reporter=line,html,github,json
          else
            npx playwright test --reporter=line,html,github,json
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14

  flake-accumulate:
    name: E2E flake ledger (nightly → dev)
    needs: [full]
    if: always() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # The scheduled run fires on the default branch (main), but main stays
    # human-reviewed — so we check out dev and accumulate the rolling 14-day
    # ledger there (mirrors the coverage-ratchet job in tests.yml). Runs even
    # when the full suite reports failures (flaky data is exactly the point).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download full-suite results
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-full
          path: dl
      - name: Ingest + prune + report + gate + commit [skip ci]
        working-directory: ./frontend
        run: |
          RESULTS="../dl/test-results/results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "no results.json in artifact — skipping accumulation"
            exit 0
          fi
          node scripts/flake/ingest.mjs --file "$RESULTS" \
            --commit "${{ github.sha }}" --branch dev --prune
          node scripts/flake/report.mjs --ledger tests/e2e/flake-history.ndjson \
            --out flake-report.json --html flake-report.html
          node scripts/flake/gate.mjs --report flake-report.json || true
          if git diff --quiet -- tests/e2e/flake-history.ndjson; then
            echo "flake ledger unchanged"
          else
            git config user.name 'flake-tracker-bot'
            git config user.email 'bot@noreply'
            git add tests/e2e/flake-history.ndjson
            git commit -m 'chore(ci): update e2e flake ledger [skip ci]'
            git push origin HEAD:dev || echo "push skipped (non-fast-forward; next run reconciles)"
          fi
      - name: Upload flake report (nightly)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-report-nightly-${{ github.run_id }}
          path: frontend/flake-report.*
          retention-days: 14
