name: "CI: Tests, Lint & Security"

# CI Pipeline — runs on PRs and push to develop
# Consolidates: tests.yml + nplusone-detection.yml + CI portion of ci-cd.yml
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ========== SETUP & CACHE ==========
  setup:
    name: Setup & Cache Keys
    runs-on: ubuntu-latest
    outputs:
      composer-hash: ${{ steps.composer-hash.outputs.hash }}
      pnpm-hash: ${{ steps.pnpm-hash.outputs.hash }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Generate cache keys
        id: composer-hash
        run: echo "hash=$(sha256sum backend/composer.lock | cut -c1-16)" >> "$GITHUB_OUTPUT"
      - name: PNPM cache key
        id: pnpm-hash
        run: echo "hash=$(sha256sum frontend/pnpm-lock.yaml | cut -c1-16)" >> "$GITHUB_OUTPUT"

  # ========== DATE CORRECTNESS GUARDRAIL ==========
  date-correctness-guard:
    name: Date Correctness Guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Assert booking date correctness
        run: bash scripts/assert-date-correctness.sh

  # ========== BACKEND SETUP ==========
  backend-setup:
    name: Backend Setup (Composer)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql,gd,bcmath,ctype,json,mbstring,openssl,tokenizer,xml
          tools: composer
          coverage: xdebug
      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ needs.setup.outputs.composer-hash }}
          restore-keys: composer-${{ runner.os }}-
      - name: Install dependencies
        working-directory: ./backend
        run: composer install --optimize-autoloader --no-interaction --prefer-dist --no-scripts
      - name: Cache vendor
        uses: actions/cache/save@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}

  # ========== FRONTEND SETUP ==========
  frontend-setup:
    name: Frontend Setup (pnpm)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ needs.setup.outputs.pnpm-hash }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}

  # ========== BACKEND TESTS (Pest + Coverage) ==========
  backend-tests:
    name: Backend Tests (Pest)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        db: [pgsql]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          coverage: xdebug
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Setup environment
        working-directory: ./backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan package:discover --ansi --env=testing
          php scripts/check-test-db.php
          php artisan migrate --env=testing --force
      - name: Assert schema constraints
        if: matrix.db == 'pgsql'
        working-directory: ./backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
        run: php artisan db:assert-schema-constraints
      - name: Run Pest tests (Parallel)
        working-directory: ./backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          CACHE_DRIVER: redis
        run: |
          php artisan test \
            --parallel \
            --processes=4 \
            --coverage-clover=coverage.xml \
            --coverage-text \
            --min-coverage-percentage=95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          verbose: true
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
      - name: Comment PR with test results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Backend tests failed. Please check the logs for details.'
            })

  # ========== CONCURRENT BOOKING STRESS TEST ==========
  booking-stress-test:
    name: Concurrent Booking Test (50 concurrent)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Setup environment
        working-directory: ./backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan package:discover --ansi --env=testing
          php artisan migrate --env=testing --force
      - name: Tune Postgres for contention diagnosis
        # deadlock_timeout defaults to 1s, so every EXCLUDE-constraint
        # collision round costs >=1s before the detector fires — at 4 workers
        # x 3 retries that starves the stub's 30s client window (RCA
        # 2026-06-10). 100ms keeps detection rounds cheap; log_lock_waits +
        # error statements give SQLSTATE ground truth in the service log
        # captured on failure below. Both are sighup-level: reload suffices.
        run: |
          PGPASSWORD=password psql -h 127.0.0.1 -U testing -d testing \
            -c "ALTER SYSTEM SET deadlock_timeout = '100ms'" \
            -c "ALTER SYSTEM SET log_lock_waits = 'on'" \
            -c "ALTER SYSTEM SET log_min_error_statement = 'error'" \
            -c "SELECT pg_reload_conf()"
      - name: Start server
        working-directory: ./backend
        # PHP_CLI_SERVER_WORKERS forks 4 built-in-server workers so the 50
        # curl_multi booking requests in the stub are handled concurrently
        # (real FOR UPDATE lock contention + exclusion-constraint races)
        # instead of being serialized one-at-a-time by a single worker, which
        # never exercises the race the test exists to catch.
        # --no-reload is REQUIRED: Laravel's ServeCommand::initialize() silently
        # downgrades to a SINGLE worker (with a warning) unless reloading is
        # disabled, so without it PHP_CLI_SERVER_WORKERS is a no-op.
        run: php artisan serve --host=127.0.0.1 --port=8000 --no-reload &
        env:
          APP_ENV: testing
          PHP_CLI_SERVER_WORKERS: "4"
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
      - name: Run concurrent booking stress test
        run: |
          # Wait until the built-in server (master + 4 forked workers) is
          # actually accepting connections before firing the 50-request burst,
          # so the requests truly overlap instead of racing a half-booted server.
          # NOTE: /up is intentionally 404 in this app (asserted by
          # HealthControllerTest), so probe at the connection level — any HTTP
          # response means a worker is serving — rather than a specific 200 route.
          for i in {1..30}; do
            if curl -s -o /dev/null http://127.0.0.1:8000/; then
              echo "Backend accepting connections after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend never started accepting connections within 30s" >&2
              exit 1
            fi
            sleep 1
          done
          php backend/tests/stubs/concurrent_booking_test.php
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
      - name: Capture contention evidence (on failure)
        if: failure()
        run: |
          echo "=== laravel.log (tail) ==="
          tail -n 200 backend/storage/logs/laravel.log 2>/dev/null || echo "no laravel.log"
          echo "=== postgres service log (tail) — SQLSTATEs, lock waits, deadlocks ==="
          docker logs "${{ job.services.postgres.id }}" 2>&1 | tail -n 200

  # ========== N+1 QUERY DETECTION (merged from nplusone-detection.yml) ==========
  nplusone-detection:
    name: N+1 Query Detection
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, curl, mbstring
          tools: composer:v2
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Setup Laravel
        run: |
          cd backend
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan package:discover --ansi --env=testing
      - name: Setup Database
        run: |
          cd backend
          php artisan migrate --env=testing --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          CACHE_DRIVER: array
          SESSION_DRIVER: array
      - name: Run N+1 Query Tests
        run: |
          cd backend
          php artisan test tests/Feature/NPlusOneQueriesTest.php --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUERY_DETECTOR_ENABLED: true
          QUERY_DETECTOR_THRESHOLD: 50
      - name: Report Results
        if: success()
        run: |
          {
            echo "## N+1 Query Detection Results"
            echo "- ✅ Query count within acceptable range"
            echo "- ✅ All eager loading working"
            echo "- ✅ Cache invalidation events firing"
          } >> "$GITHUB_STEP_SUMMARY"

  # ========== STATIC ANALYSIS: PHPStan ==========
  phpstan:
    name: PHPStan (Level 5)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: PHPStan analysis (Level 5)
        working-directory: ./backend
        # Use the lockfile-pinned analyzer (vendor/bin/phpstan), NOT a global
        # `phpstan` from setup-php `tools:` — the global binary floats to the
        # latest release and drifts out of sync with the locked larastan
        # extension, causing FunctionCallParametersCheck arity crashes.
        run: php -d opcache.enable_cli=0 vendor/bin/phpstan analyse --error-format=github

  # ========== STATIC ANALYSIS: Psalm ==========
  psalm:
    name: Psalm (Level 1)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          tools: psalm
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Psalm analysis
        working-directory: ./backend
        run: |
          php -d opcache.enable_cli=0 \
            -d opcache.jit=0 \
            -d opcache.jit_buffer_size=0 \
            vendor/bin/psalm --output-format=github

  # ========== CODE STYLE: Laravel Pint ==========
  pint:
    name: Laravel Pint (Code Style)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Check code style
        working-directory: ./backend
        run: vendor/bin/pint --test

  # ========== PHP SYNTAX CHECK ==========
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo
          tools: composer:v2
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Check PHP syntax (parallel scan)
        run: |
          cd backend
          find app tests -name "*.php" -print0 | xargs -0 -P 4 -I {} php -l {} > /dev/null || exit 1

  # ========== SECURITY: Composer Audit ==========
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Restore vendor
        id: restore-vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Install Composer dependencies (cache miss fallback)
        if: steps.restore-vendor.outputs.cache-hit != 'true'
        working-directory: ./backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
      - name: Audit Composer dependencies
        working-directory: ./backend
        env:
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_IPRESOLVE: 4
        run: |
          set +e

          composer --version
          php -r "echo 'default_socket_timeout='.ini_get('default_socket_timeout').PHP_EOL;"
          composer diagnose -vvv || true

          curl -4 -I \
            --connect-timeout 20 \
            --max-time 60 \
            https://packagist.org/api/security-advisories/ || true

          # Exit-code contract (do not widen the retry branch):
          #   0   = clean -> pass
          #   100 = Composer transport/runtime failure (e.g. Packagist timeout) -> retry
          #   any other non-zero = real advisory/abandoned/policy finding -> hard fail now
          # Retry never converts a non-zero into success, so the gate cannot fail open.
          for attempt in 1 2 3; do
            php -d default_socket_timeout=300 "$(command -v composer)" audit \
              --locked \
              --no-interaction \
              --format=table

            status=$?

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -eq 100 ]; then
              echo "composer audit transport/runtime failure (exit 100); retry ${attempt}/3"
              sleep $((attempt * 10))
              continue
            fi

            exit "$status"
          done

          exit 100

  # ========== SECURITY: NPM Audit ==========
  # Batch 4 / 3C: now blocking on HIGH/CRITICAL. Accepted advisories must be added
  # to frontend/.audit-exceptions.json (see file for format + expiry rules).
  npm-audit:
    name: NPM Audit (HIGH/CRITICAL — blocking)
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Audit NPM dependencies (with allowlist)
        working-directory: ./frontend
        run: node ../scripts/audit-with-exceptions.mjs

  # ========== SECURITY: Gitleaks ==========
  security-scan:
    name: Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.28.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Check for exposed credentials
        run: gitleaks detect --source . --redact --verbose --log-opts="--all" --config .gitleaks.toml

  # ========== FRONTEND TYPECHECK (tsc --noEmit) ==========
  frontend-typecheck:
    name: Frontend Typecheck (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Run TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

  # ========== FRONTEND TESTS (Vitest) ==========
  frontend-unit-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Run Vitest unit tests
        working-directory: ./frontend
        run: pnpm test:unit --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 14

  # ========== COVERAGE RATCHET (frontend, dev only — SUGGEST ONLY) ==========
  # Floors are ENFORCED by Vitest inside frontend-unit-tests (it reads
  # frontend/coverage-thresholds.json dynamically at config load). After a green
  # run on dev this job checks whether the floor COULD rise and, if so, publishes
  # the suggested coverage-thresholds.json as a job-summary diff + artifact.
  #
  # It deliberately does NOT push back to dev: every threshold bump goes through a
  # normal human PR so it gets full CI + review (per CLAUDE.md main stays
  # human-reviewed). No bot commits, no [skip ci] — and note a GITHUB_TOKEN push
  # would not trigger CI anyway, so committing back was a silent, unverified bump.
  coverage-ratchet:
    name: Coverage Ratchet (suggest only, dev)
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Compute suggested floors
        id: ratchet
        working-directory: ./frontend
        # exit 0 = a higher floor is available, exit 2 = unchanged, never exit 1.
        run: |
          set +e
          bash scripts/ratchet-coverage.sh
          echo "code=$?" >> "$GITHUB_OUTPUT"
      - name: Publish suggested floors (summary)
        if: steps.ratchet.outputs.code == '0'
        working-directory: ./frontend
        run: |
          {
            echo "### 📈 Coverage floors can rise"
            echo ""
            echo "A green dev run measured coverage above the current floors. To raise"
            echo "them, open a PR applying this \`frontend/coverage-thresholds.json\`"
            echo "(also downloadable as the **coverage-thresholds-suggested** artifact):"
            echo ""
            echo '```diff'
            git diff -- coverage-thresholds.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Coverage ratchet::Higher coverage floors are available — apply coverage-thresholds.json via PR."
      - name: Upload suggested thresholds
        if: steps.ratchet.outputs.code == '0'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-thresholds-suggested
          path: frontend/coverage-thresholds.json
          retention-days: 14

  # ========== FRONTEND LINT ==========
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: "/api"
          NODE_ENV: production
        run: pnpm run build
      - name: Lint
        working-directory: ./frontend
        run: pnpm run lint

  # ========== INFRA: Docker Compose Validation ==========
  docker-compose-validate:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        shell: bash
        run: |
          set -euo pipefail
          unset REDIS_PASSWORD # Host env has precedence over --env-file; avoid empty CI values shadowing the template.
          docker compose \
            --project-directory "$GITHUB_WORKSPACE" \
            --env-file "$GITHUB_WORKSPACE/.env.example" \
            config -q # Validate structure without printing interpolated values to logs.
