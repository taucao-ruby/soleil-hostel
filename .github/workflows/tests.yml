name: "CI: Tests, Lint & Security"

# CI Pipeline — runs on PRs and push to develop
# Consolidates: tests.yml + nplusone-detection.yml + CI portion of ci-cd.yml
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ========== SETUP & CACHE ==========
  setup:
    name: Setup & Cache Keys
    runs-on: ubuntu-latest
    outputs:
      composer-hash: ${{ steps.composer-hash.outputs.hash }}
      pnpm-hash: ${{ steps.pnpm-hash.outputs.hash }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Generate cache keys
        id: composer-hash
        run: echo "hash=$(sha256sum backend/composer.lock | cut -c1-16)" >> $GITHUB_OUTPUT
      - name: PNPM cache key
        id: pnpm-hash
        run: echo "hash=$(sha256sum frontend/pnpm-lock.yaml | cut -c1-16)" >> $GITHUB_OUTPUT

  # ========== BACKEND SETUP ==========
  backend-setup:
    name: Backend Setup (Composer)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql,gd,bcmath,ctype,json,mbstring,openssl,tokenizer,xml
          tools: composer,phpstan
          coverage: xdebug
      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ needs.setup.outputs.composer-hash }}
          restore-keys: composer-${{ runner.os }}-
      - name: Install dependencies
        working-directory: ./backend
        run: composer install --optimize-autoloader --no-interaction --prefer-dist
      - name: Cache vendor
        uses: actions/cache/save@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}

  # ========== FRONTEND SETUP ==========
  frontend-setup:
    name: Frontend Setup (pnpm)
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ needs.setup.outputs.pnpm-hash }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}

  # ========== BACKEND TESTS (Pest + Coverage) ==========
  backend-tests:
    name: Backend Tests (Pest)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          coverage: xdebug
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Setup environment
        working-directory: ./backend
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force
      - name: Run Pest tests (Parallel)
        working-directory: ./backend
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_DRIVER: redis
        run: |
          php artisan test \
            --parallel \
            --processes=4 \
            --coverage-clover=coverage.xml \
            --coverage-text \
            --min-coverage-percentage=95
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: true
          verbose: true
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
      - name: Comment PR with test results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Backend tests failed. Please check the logs for details.'
            })

  # ========== CONCURRENT BOOKING STRESS TEST ==========
  booking-stress-test:
    name: Concurrent Booking Test (50 concurrent)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Setup environment
        working-directory: ./backend
        run: |
          cp .env.example .env.testing
          php artisan key:generate --env=testing
          php artisan migrate --env=testing --force
      - name: Start server
        working-directory: ./backend
        run: php artisan serve --host=127.0.0.1 --port=8000 &
        env:
          APP_ENV: testing
      - name: Run concurrent booking stress test
        run: |
          sleep 3
          php backend/tests/stubs/concurrent_booking_test.php

  # ========== N+1 QUERY DETECTION (merged from nplusone-detection.yml) ==========
  nplusone-detection:
    name: N+1 Query Detection
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        options: >-
          --health-cmd="pg_isready -U testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, curl, mbstring
          tools: composer:v2
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Setup Laravel
        run: |
          cd backend
          cp .env.example .env.testing
          php artisan key:generate --env=testing
      - name: Setup Database
        run: |
          cd backend
          php artisan migrate --env=testing --database=testing --force
        env:
          DB_CONNECTION: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          CACHE_DRIVER: array
          SESSION_DRIVER: array
      - name: Run N+1 Query Tests
        run: |
          cd backend
          php artisan test tests/Feature/NPlusOneQueriesTest.php --env=testing
        env:
          DB_CONNECTION: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testing
          DB_USERNAME: testing
          DB_PASSWORD: password
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUERY_DETECTOR_ENABLED: true
          QUERY_DETECTOR_THRESHOLD: 50
      - name: Report Results
        if: success()
        run: |
          echo "## N+1 Query Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Query count within acceptable range" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All eager loading working" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cache invalidation events firing" >> $GITHUB_STEP_SUMMARY

  # ========== STATIC ANALYSIS: PHPStan ==========
  phpstan:
    name: PHPStan (Level 9)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          tools: phpstan
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: PHPStan analysis (Level 9)
        working-directory: ./backend
        run: phpstan analyse --level=9 app/ --error-format=github

  # ========== STATIC ANALYSIS: Psalm ==========
  psalm:
    name: Psalm (Level 1)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: redis,pdo_pgsql
          tools: psalm
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Psalm analysis
        working-directory: ./backend
        run: psalm --output-format=github

  # ========== CODE STYLE: Laravel Pint ==========
  pint:
    name: Laravel Pint (Code Style)
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Check code style
        working-directory: ./backend
        run: vendor/bin/pint --test

  # ========== PHP SYNTAX CHECK ==========
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo
          tools: composer:v2
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Check PHP syntax (parallel scan)
        run: |
          cd backend
          find app tests -name "*.php" -print0 | xargs -0 -P 4 -I {} php -l {} > /dev/null || exit 1

  # ========== SECURITY: Composer Audit ==========
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    needs: [backend-setup, setup]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Restore vendor
        uses: actions/cache/restore@v4
        with:
          path: backend/vendor
          key: backend-vendor-${{ needs.setup.outputs.composer-hash }}
      - name: Audit Composer dependencies
        working-directory: ./backend
        run: composer audit

  # ========== SECURITY: NPM Audit ==========
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Audit NPM dependencies
        working-directory: ./frontend
        run: pnpm audit --audit-level=high

  # ========== SECURITY: Gitleaks ==========
  security-scan:
    name: Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for exposed credentials
        uses: gitleaks/gitleaks-action@v2

  # ========== FRONTEND TESTS (Vitest) ==========
  frontend-unit-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Run Vitest unit tests
        working-directory: ./frontend
        run: pnpm test:unit --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  # ========== FRONTEND LINT ==========
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: [frontend-setup, setup]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: frontend/node_modules
          key: frontend-node-${{ needs.setup.outputs.pnpm-hash }}
      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: "http://localhost:8000/api"
          NODE_ENV: production
        run: pnpm run build
      - name: Lint
        working-directory: ./frontend
        run: pnpm run lint
