services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-soleil}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-homestay}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-soleil}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ========== REDIS SERVICE (NEW) ==========
  # Cache + Session + Rate Limiting + Queue
  # Production: 2GB memory, AOF+RDB persistence
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redisdata:/data
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD";
        else
          exec redis-server /usr/local/etc/redis/redis.conf;
        fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_REPL_DISKLESS_SYNC: "yes"
      REDIS_MAX_CLIENTS: 50000
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-homestay}
      DB_USERNAME: ${DB_USERNAME:-soleil}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_CLIENT: phpredis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:5173,127.0.0.1:5173}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}
    command: 'bash -lc "set -e; composer install --no-interaction --prefer-dist; (grep -q \"^APP_KEY=base64:\" .env || php artisan key:generate --force); echo \"Run: docker compose exec backend php artisan migrate\"; php-fpm -D && nginx -g \"daemon off;\""'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000/api}
    command: bash -lc "set -e; corepack enable && pnpm install; pnpm run dev -- --host 0.0.0.0"

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
  frontend_node_modules:
