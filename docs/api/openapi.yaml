openapi: 3.1.0
info:
  title: Soleil Hostel API
  version: 2.0.0
  description: |
    Production-ready hostel management API built with Laravel 11 + PHP 8.3.

    ## Features
    - **Dual Auth Modes**: Bearer Token (stateless) + HttpOnly Cookie (web browsers)
    - **Unified Auth Endpoints**: Mode-agnostic endpoints that auto-detect auth method
    - **RBAC**: Three roles — USER, MODERATOR, ADMIN
    - **Optimistic Locking**: Room updates require `lock_version` to prevent lost updates
    - **Pessimistic Locking**: Booking creation uses `SELECT ... FOR UPDATE` to prevent double-booking
    - **Rate Limiting**: Multi-tier rate limiting (IP, user, endpoint-specific)
    - **Correlation ID**: Include `X-Correlation-ID` header for request tracing

    ## Authentication Quick Start

    **Option A — Bearer Token (mobile / SPA):**
    ```
    POST /api/auth/login-v2  →  { "token": "abc123..." }
    Then: Authorization: Bearer abc123...
    ```

    **Option B — HttpOnly Cookie (web browser):**
    ```
    POST /api/auth/login-httponly  →  Set-Cookie: soleil_token=...
    Cookies sent automatically on subsequent requests.
    ```

    **Option C — Unified Endpoints (auto-detect):**
    ```
    GET /api/auth/unified/me  →  Works with either auth mode
    ```

    ## Rate Limits
    - Login: 5 requests/min per IP
    - General API (public): 200 requests/min
    - General API (authenticated): 500 requests/min
    - Booking creation: 3 requests/min per user

    ## Deprecation Policy
    Legacy endpoints return RFC 8594 headers (`Deprecation`, `Sunset`, `Link`).
    Sunset date: July 31, 2026. See [API Deprecation Guide](./API_DEPRECATION.md).
  contact:
    name: API Support
    email: support@soleilhostel.com
  license:
    name: MIT

servers:
  - url: https://api.soleilhostel.com/api
    description: Production
  - url: http://localhost:8000/api
    description: Local Development

tags:
  - name: Authentication
    description: Login, registration, token management, and unified auth endpoints
  - name: Email Verification
    description: Email verification flow (required for booking creation)
  - name: Rooms
    description: Room listing, detail, and management (admin-only for writes)
  - name: Bookings
    description: Create, update, cancel, and manage bookings
  - name: Admin Bookings
    description: Admin-only booking management (soft-delete recovery, audit)
  - name: Health
    description: Kubernetes-style health probes and detailed system checks
  - name: Contact
    description: Public contact form
  - name: AI Harness
    description: AI-powered assistant endpoints (FAQ, room discovery, booking status, admin drafts) with proposal confirmation
  - name: Deprecated
    description: Legacy endpoints scheduled for removal (sunset July 2026)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: |
        Sanctum bearer token for stateless API clients (mobile apps, SPAs).
        Obtained via `POST /auth/login-v2`.
        Include in header: `Authorization: Bearer {token}`

    CookieAuth:
      type: apiKey
      in: cookie
      name: soleil_token
      description: |
        HttpOnly cookie authentication for web browsers.
        Login via `POST /auth/login-httponly`, then cookie is auto-sent.
        CSRF protection via SameSite=Strict.

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 17
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        role:
          type: string
          enum: [user, moderator, admin]
          example: "user"
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-01-15T10:30:00.000000Z"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Room:
      type: object
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: "Ocean View Double"
        description:
          type: string
          nullable: true
          example: "Spacious room with ocean view"
        price:
          type: number
          format: decimal
          example: 120.00
        max_guests:
          type: integer
          minimum: 1
          maximum: 10
          example: 2
        status:
          type: string
          enum: [active, inactive]
          example: "active"
        lock_version:
          type: integer
          description: |
            Optimistic locking version. MUST be included in PUT/PATCH requests.
            Backend returns 409 Conflict if version doesn't match.
          example: 5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 1001
        room_id:
          type: integer
          example: 42
        user_id:
          type: integer
          example: 17
        check_in:
          type: string
          format: date
          example: "2026-06-01"
        check_out:
          type: string
          format: date
          example: "2026-06-05"
        guest_name:
          type: string
          example: "Jane Doe"
        guest_email:
          type: string
          format: email
          example: "jane@example.com"
        status:
          type: string
          enum: [pending, confirmed, refund_pending, cancelled, refund_failed]
          example: "confirmed"
        amount:
          type: number
          format: decimal
          nullable: true
          example: 480.00
        payment_intent_id:
          type: string
          nullable: true
        refund_status:
          type: string
          nullable: true
          enum: [null, pending, completed, failed]
        refund_amount:
          type: integer
          nullable: true
          description: "Refund amount in cents"
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancelled_by:
          type: integer
          nullable: true
        room:
          $ref: "#/components/schemas/Room"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["The email field is required"]
            check_out: ["Check-out date must be after check-in date"]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    TokenInfo:
      type: object
      properties:
        name:
          type: string
          example: "login_web"
        type:
          type: string
          enum: [short_lived, long_lived]
          example: "short_lived"
        device_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        expires_in_minutes:
          type: integer
          example: 60
        expires_in_seconds:
          type: integer
          example: 3540

    # ─── AI Harness Schemas ───

    AiHandleRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User input text
          example: "Giá phòng Deluxe bao nhiêu?"

    AiHandleResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            request_id:
              type: string
              example: "ai-a1b2c3d4e5f6a1b2c3d4e5f6"
            response_class:
              type: string
              enum: [answer, abstain, refusal, error, fallback]
              example: "answer"
            content:
              type: string
              description: Vietnamese user-facing reply
              example: "Phòng Deluxe có giá 150 USD/đêm."
            citations:
              type: array
              items:
                type: object
                properties:
                  source_slug:
                    type: string
                  verified_at:
                    type: string
                    format: date-time
            proposals:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/BookingActionProposal"
            failure_reason:
              type: string
              nullable: true
            estimated_cost_usd:
              type: number
              format: float
              example: 0.0012
            trace_ref:
              type: object
              properties:
                request_id:
                  type: string
                trace_logged:
                  type: boolean
        message:
          type: string
          nullable: true
        errors:
          type: object
          nullable: true
        meta:
          type: object
          properties:
            pagination:
              nullable: true
        trace_id:
          type: string
        timestamp:
          type: string
          format: date-time

    BookingActionProposal:
      type: object
      properties:
        action_type:
          type: string
          enum: [suggest_booking, suggest_cancellation]
        proposed_params:
          type: object
          properties:
            room_id:
              type: integer
              nullable: true
            check_in:
              type: string
              format: date-time
              nullable: true
            check_out:
              type: string
              format: date-time
              nullable: true
            available:
              type: boolean
              nullable: true
            booking_id:
              type: integer
              nullable: true
        human_readable_summary:
          type: string
        policy_refs:
          type: array
          items:
            type: string
        risk_assessment:
          type: object
        requires_confirmation:
          type: boolean
          example: true
        proposal_hash:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: SHA-256 hex hash for proposal identification
        generated_at:
          type: string
          format: date-time

    ProposalDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [confirmed, declined]
          description: User decision on the proposal
          example: "confirmed"

    ProposalDecisionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            proposal_hash:
              type: string
              pattern: "^[a-f0-9]{64}$"
            decision:
              type: string
              enum: [confirmed, declined]
            downstream_result:
              type: string
              nullable: true
              description: "Result of downstream action (e.g. booking_created:123)"
              example: "booking_created:123"
            message:
              type: string
              example: "Hành động đã được thực hiện thành công."
        message:
          type: string
          nullable: true
        errors:
          type: object
          nullable: true
        meta:
          type: object
          properties:
            pagination:
              nullable: true
        trace_id:
          type: string
        timestamp:
          type: string
          format: date-time

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Unauthenticated"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "This action is unauthorized."

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Room not found"

    ValidationError:
      description: Input validation failed (422)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimitExceeded:
      description: Too many requests (429)
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
            example: 60
        X-RateLimit-Remaining:
          schema:
            type: integer
            example: 0
        Retry-After:
          schema:
            type: integer
            example: 42
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Too many requests. Please try again in 42 seconds."

    VersionConflict:
      description: Optimistic locking conflict (409)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Room data has been modified by another user. Please refresh and try again."
              current_version:
                type: integer
                example: 7
              provided_version:
                type: integer
                example: 5

    BookingConcurrentConflict:
      description: |
        Concurrent booking conflict (409). Raised when the PostgreSQL exclusion
        constraint `no_overlapping_bookings` (EXCLUDE USING gist) rejects a
        booking insert because another concurrent request claimed the same
        room/date range first. Distinct from `VersionConflict` (which is for
        optimistic locking on rooms): no version fields are returned. Safe to
        retry with a different date range.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Phòng vừa được đặt bởi yêu cầu khác. Vui lòng chọn ngày khác hoặc thử lại."

    InternalServerError:
      description: |
        Opaque server error (500). The server logs the underlying cause
        (including PostgreSQL SQLSTATE for DB errors); the response body
        intentionally does NOT leak SQLSTATE codes, constraint names, or
        stack traces.
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: "Đã xảy ra lỗi khi đặt phòng. Vui lòng thử lại."

paths:
  # ═══════════════════════════════════════
  # AUTHENTICATION - Public
  # ═══════════════════════════════════════

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      operationId: register
      description: |
        Creates a new user account. Sends verification email automatically.
        Rate limited: 5 requests/min per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 255
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                password_confirmation:
                  type: string
                  format: password
                  example: "SecurePass123!"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "User registered successfully"
                  data:
                    type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      access_token:
                        type: string
                        example: "1|abcdef123456..."
                      token_type:
                        type: string
                        example: "Bearer"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/login-v2:
    post:
      tags: [Authentication]
      summary: Login with Bearer Token (stateless)
      operationId: loginBearer
      description: |
        Authenticate and receive a Sanctum bearer token.
        Use for mobile apps, SPAs, and API clients.

        **Token Types:**
        - `short_lived`: 60 minutes (default)
        - `long_lived`: 30 days (when `remember_me: true`)

        **Single Device Login:** Enabled by default — previous tokens are revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  format: password
                  example: "SecurePass123!"
                remember_me:
                  type: boolean
                  default: false
                  description: "If true, issues a long-lived token (30 days)"
                device_name:
                  type: string
                  default: "login_web"
                  description: "Identifier for the device/client"
      responses:
        "201":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Đăng nhập thành công."
                  token:
                    type: string
                    example: "abcdef1234567890abcdef1234567890abcdefgh"
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                  expires_at:
                    type: string
                    format: date-time
                  expires_in_minutes:
                    type: integer
                    example: 60
                  type:
                    type: string
                    enum: [short_lived, long_lived]
                  device_id:
                    type: string
                    format: uuid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /auth/login-httponly:
    post:
      tags: [Authentication]
      summary: Login with HttpOnly Cookie (web browsers)
      operationId: loginHttpOnly
      description: |
        Authenticate and receive token via HttpOnly cookie.
        **Recommended for web browsers** — XSS-safe, CSRF-protected.

        Cookie details:
        - Name: `soleil_token`
        - HttpOnly: `true`
        - SameSite: `Strict`
        - Secure: `true` (production only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                remember_me:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Login successful. Token set in HttpOnly cookie.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "soleil_token=uuid-here; HttpOnly; SameSite=Strict; Path=/"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login thành công. Token đã được set trong httpOnly cookie."
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                  expires_in_minutes:
                    type: integer
                  expires_at:
                    type: string
                    format: date-time
                  token_type:
                    type: string
                    enum: [short_lived, long_lived]
                  csrf_token:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  # ═══════════════════════════════════════
  # AUTHENTICATION - Protected (Bearer)
  # ═══════════════════════════════════════

  /auth/me-v2:
    get:
      tags: [Authentication]
      summary: Get current user + token info (Bearer)
      operationId: meBearerV2
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user with token metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                  token:
                    $ref: "#/components/schemas/TokenInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh-v2:
    post:
      tags: [Authentication]
      summary: Refresh bearer token (rotate)
      operationId: refreshBearerV2
      description: |
        Revokes current token and issues a new one.
        Max 10 refreshes/hour — exceeding triggers suspicious activity lockout.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token refreshed thành công."
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  expires_in_minutes:
                    type: integer
                  type:
                    type: string
                  old_token_status:
                    type: string
                    example: "revoked"
        "401":
          description: Token expired, revoked, or suspicious activity detected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  code:
                    type: string
                    enum: [TOKEN_EXPIRED, TOKEN_REVOKED, SUSPICIOUS_ACTIVITY]

  /auth/logout-v2:
    post:
      tags: [Authentication]
      summary: Logout current session (Bearer)
      operationId: logoutBearerV2
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logout thành công."
                  revoked_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout-all-v2:
    post:
      tags: [Authentication]
      summary: Logout all devices (Bearer)
      operationId: logoutAllBearerV2
      description: Revokes all active tokens for the current user.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  revoked_count:
                    type: integer
                    example: 3
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════
  # AUTHENTICATION - Protected (HttpOnly)
  # ═══════════════════════════════════════

  /auth/me-httponly:
    get:
      tags: [Authentication]
      summary: Get current user (HttpOnly Cookie)
      operationId: meHttpOnly
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Current user and token info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                  token:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
                      expires_in_minutes:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh-httponly:
    post:
      tags: [Authentication]
      summary: Refresh HttpOnly cookie token
      operationId: refreshHttpOnly
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Token refreshed. New cookie set.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  expires_in_minutes:
                    type: integer
                  expires_at:
                    type: string
                    format: date-time
                  csrf_token:
                    type: string
        "401":
          description: Suspicious activity or expired token

  /auth/logout-httponly:
    post:
      tags: [Authentication]
      summary: Logout (HttpOnly Cookie)
      operationId: logoutHttpOnly
      security:
        - CookieAuth: []
      responses:
        "200":
          description: Logged out. Cookie cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
                description: Empty cookie with negative max-age
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Logout thành công."

  # ═══════════════════════════════════════
  # UNIFIED AUTH (mode-agnostic)
  # ═══════════════════════════════════════

  /auth/unified/me:
    get:
      tags: [Authentication]
      summary: Get current user (auto-detects auth mode)
      operationId: unifiedMe
      description: |
        Auto-detects Bearer token or HttpOnly cookie and returns user info.
        Detection priority: HttpOnly cookie → Bearer token → 401.
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                  token:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/unified/logout:
    post:
      tags: [Authentication]
      summary: Logout (auto-detects auth mode)
      operationId: unifiedLogout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Logged out (token revoked or cookie cleared)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/unified/logout-all:
    post:
      tags: [Authentication]
      summary: Logout all devices (auto-detects auth mode)
      operationId: unifiedLogoutAll
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  revoked_count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════
  # EMAIL VERIFICATION
  # ═══════════════════════════════════════

  /email/verification-status:
    get:
      tags: [Email Verification]
      summary: Check email verification status
      operationId: emailVerificationStatus
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  verified:
                    type: boolean
                  email:
                    type: string
                  email_verified_at:
                    type: string
                    format: date-time
                    nullable: true

  /email/verification-notification:
    post:
      tags: [Email Verification]
      summary: Resend verification email
      operationId: resendVerificationEmail
      description: Rate limited to prevent abuse.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Verification email sent (or already verified)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /email/verify/{id}/{hash}:
    get:
      tags: [Email Verification]
      summary: Verify email address (from email link)
      operationId: verifyEmail
      description: User clicks this link from their verification email.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: hash
          required: true
          schema:
            type: string
        - in: query
          name: expires
          required: true
          schema:
            type: integer
        - in: query
          name: signature
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
