      tags: [Deprecated]
      summary: "[DEPRECATED] Get user (use /auth/me-v2 or /auth/unified/me)"
      operationId: meLegacy
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User info (with deprecation headers)

  /auth/logout:
    post:
      deprecated: true
      tags: [Deprecated]
      summary: "[DEPRECATED] Logout (use /auth/logout-v2 or /auth/unified/logout)"
      operationId: logoutLegacy
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out (with deprecation headers)

  /auth/refresh:
    post:
      deprecated: true
      tags: [Deprecated]
      summary: "[DEPRECATED] Refresh token (use /auth/refresh-v2)"
      operationId: refreshLegacy
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token refreshed (with deprecation headers)
