                  verified:
                    type: boolean
        "403":
          description: Invalid signature or expired link

  # ═══════════════════════════════════════
  # ROOMS (v1)
  # ═══════════════════════════════════════

  /v1/rooms:
    get:
      tags: [Rooms]
      summary: List all rooms with availability
      operationId: listRooms
      description: |
        Returns all active rooms. Optionally filter by date range for availability.
        Results are cached in Redis for fast repeated queries.
      parameters:
        - in: query
          name: check_in
          schema:
            type: string
            format: date
          description: Filter rooms available from this date
          example: "2026-06-01"
        - in: query
          name: check_out
          schema:
            type: string
            format: date
          description: Filter rooms available until this date
          example: "2026-06-05"
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Room list fetched successfully"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Room"

    post:
      tags: [Rooms]
      summary: Create a new room (Admin only)
      operationId: createRoom
      security:
        - BearerAuth: []
      description: |
        Creates a new room. Requires ADMIN role.
        New rooms get `lock_version: 1` automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, max_guests]
              properties:
                name:
                  type: string
                  example: "Ocean View Double"
                description:
                  type: string
                  nullable: true
                price:
                  type: number
                  format: decimal
                  example: 120.00
                max_guests:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 2
                status:
                  type: string
                  enum: [active, inactive]
                  default: active
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Room"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/rooms/{id}:
    get:
      tags: [Rooms]
      summary: Get room details
      operationId: getRoom
      description: |
        Returns room details including `lock_version`.
        Store this version — it's required for update requests.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Room"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Rooms]
      summary: Update room (with optimistic locking)
      operationId: updateRoom
      description: |
        **Optimistic Locking Required:**
        1. `GET /v1/rooms/42` → returns `lock_version: 5`
        2. `PUT /v1/rooms/42` with `lock_version: 5` → success, new version: 6
        3. Another `PUT` with `lock_version: 5` → **409 Conflict** (stale data)

        Requires ADMIN role.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock_version]
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                  format: decimal
                max_guests:
                  type: integer
                status:
                  type: string
                  enum: [active, inactive]
                lock_version:
                  type: integer
                  description: Current version from GET request
            example:
              name: "Updated Ocean View"
              price: 150.00
              max_guests: 3
              lock_version: 5
      responses:
        "200":
          description: Room updated (lock_version incremented)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Room"
              example:
                success: true
                message: "Room updated successfully"
                data:
                  id: 42
                  name: "Updated Ocean View"
                  price: 150.00
                  lock_version: 6
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

    patch:
      tags: [Rooms]
      summary: Partially update room (with optimistic locking)
      operationId: patchRoom
      description: Same as PUT but for partial updates. `lock_version` still required.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lock_version]
              properties:
                name:
                  type: string
                price:
                  type: number
                lock_version:
                  type: integer
      responses:
        "200":
          description: Room updated
        "409":
          $ref: "#/components/responses/VersionConflict"

    delete:
      tags: [Rooms]
      summary: Delete a room (Admin only)
      operationId: deleteRoom
      description: Optionally accepts `lock_version` in body for consistency.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Room deleted successfully"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════
  # BOOKINGS (v1)
  # ═══════════════════════════════════════

  /v1/bookings:
    get:
      tags: [Bookings]
      summary: List user's bookings
      operationId: listBookings
      description: Returns all bookings for the authenticated user.
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Booking list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Bookings]
      summary: Create a new booking
      operationId: createBooking
      description: |
        **Requirements:**
        - User must be authenticated
        - Email must be verified (`verified` middleware)
        - Room must be available for selected dates (half-open interval)
        - Pessimistic locking prevents double-booking

        **Notifications:**
        - BookingCreated event dispatched
        - Confirmation email queued asynchronously
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_id, check_in, check_out, guest_name, guest_email]
              properties:
                room_id:
                  type: integer
                  example: 42
                check_in:
                  type: string
                  format: date
                  example: "2026-06-01"
                check_out:
                  type: string
                  format: date
                  example: "2026-06-05"
                guest_name:
                  type: string
                  minLength: 2
                  example: "Jane Doe"
                guest_email:
                  type: string
                  format: email
                  example: "jane@example.com"
      responses:
        "201":
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Booking created successfully"
                  data:
                    $ref: "#/components/schemas/Booking"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Email not verified (`verified` middleware rejects unverified accounts)
        "409":
          $ref: "#/components/responses/BookingConcurrentConflict"
        "422":
          description: Validation error or room not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                message: "Room is not available for the selected dates"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/bookings/{booking}:
    get:
      tags: [Bookings]
      summary: Get booking details
      operationId: getBooking
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: booking
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Booking"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Bookings]
      summary: Update a booking
      operationId: updateBooking
      description: |
        Update booking dates and guest info. Room availability is re-validated.

        **Authorization (BookingPolicy::update — two-stage gate):**
        1. Caller must be the booking owner OR an admin.
        2. Booking status must be lifecycle-active (`pending` or `confirmed`).
           Cancelled, refund_pending, and refund_failed bookings are immutable;
           the policy denies the update with **403 Forbidden** even for admins.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: booking
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [check_in, check_out]
              properties:
                check_in:
                  type: string
                  format: date
                check_out:
                  type: string
                  format: date
                guest_name:
                  type: string
                guest_email:
                  type: string
                  format: email
      responses:
        "200":
          description: Booking updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            Forbidden. Returned by the policy when the caller is neither the
            booking owner nor an admin, OR when the booking is in a terminal
            lifecycle state (cancelled / refund_pending / refund_failed) and
            therefore immutable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "This action is unauthorized."
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Bookings]
      summary: Cancel a booking (soft delete)
      operationId: deleteBooking
      description: Soft-deletes the booking with audit trail.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: booking
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Booking cancelled successfully"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/bookings/{booking}/confirm:
    post:
      tags: [Bookings]
      summary: Confirm a pending booking (Admin only)
      operationId: confirmBooking
      description: |
        Changes booking status from `pending` to `confirmed`.
        Sends confirmation email to guest. Requires ADMIN role.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: booking
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Booking confirmed successfully. Confirmation email queued."
                  data:
                    $ref: "#/components/schemas/Booking"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Booking is not in pending status, or confirmation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Chỉ có thể xác nhận booking đang ở trạng thái pending."

  /v1/bookings/{booking}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking with refund
      operationId: cancelBooking
      description: |
        Cancels booking with refund calculation:
        - **Full refund**: ≥ 48 hours before check-in
        - **50% refund**: ≥ 24 hours before check-in
        - **No refund**: < 24 hours before check-in

        Error codes surfaced in the `error` field of non-200 responses:
          - `unauthorized` — actor is not the booking owner and not admin.
          - `not_cancellable` — booking is in a terminal state.
          - `already_started` — booking check-in has passed.
          - `refund_failed` — Stripe refund raised; `retryable` indicates
             whether the operation can be retried safely.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: booking
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled (with refund info)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/Booking"
        "403":
          description: Booking cannot be cancelled by this actor (ownership / policy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  error:
                    type: string
                    enum: [unauthorized, already_started]
                    example: unauthorized
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Booking is not in a cancellable state
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  error:
                    type: string
                    enum: [not_cancellable, already_started]
                    example: not_cancellable
        "500":
          description: Refund processing failed (Stripe API error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                  error:
                    type: string
                    example: refund_failed
                  retryable:
                    type: boolean
                    description: Whether the refund can be safely retried
                    example: true

  # ═══════════════════════════════════════
  # ADMIN BOOKINGS (v1)
  # ═══════════════════════════════════════

  /v1/admin/bookings:
    get:
      tags: [Admin Bookings]
      summary: List all bookings (including soft-deleted)
      operationId: adminListBookings
      description: Returns all bookings with trashed, ordered by creation date. Admin only.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/bookings/trashed:
    get:
      tags: [Admin Bookings]
      summary: List soft-deleted bookings
      operationId: adminListTrashed
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Trashed bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
                  meta:
                    type: object
                    properties:
                      total_trashed:
                        type: integer

  /v1/admin/bookings/trashed/{id}:
    get:
      tags: [Admin Bookings]
      summary: Get a soft-deleted booking
      operationId: adminShowTrashed
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trashed booking details
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/bookings/{id}/restore:
    post:
      tags: [Admin Bookings]
      summary: Restore a soft-deleted booking
      operationId: adminRestoreBooking
      description: Validates no date overlap before restoring.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking restored
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Date conflict prevents restoration

  /v1/admin/bookings/restore-bulk:
    post:
      tags: [Admin Bookings]
      summary: Bulk restore soft-deleted bookings
      operationId: adminBulkRestore
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  example: [101, 102, 103]
      responses:
        "200":
          description: Bulk restore result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      restored_count:
                        type: integer
                      failed:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            reason:
                              type: string

  /v1/admin/bookings/{id}/force:
    delete:
      tags: [Admin Bookings]
      summary: Permanently delete a soft-deleted booking (GDPR)
      operationId: adminForceDelete
      description: |
        Permanently removes a soft-deleted booking from the database.
        Only works on already soft-deleted bookings. Used for GDPR compliance.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking permanently deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Trashed booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ═══════════════════════════════════════
  # ADMIN CUSTOMERS (v1)
  # ═══════════════════════════════════════

  /v1/admin/customers/{email}/bookings:
    get:
      tags: [Admin Bookings]
      summary: List bookings for a specific customer
      operationId: adminCustomerBookings
      description: |
        Returns the full booking history for the customer identified by
        their email address. Admin only. Route binding uses email-as-identifier;
        missing customers return an empty list under `data` (not 404).
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Customer bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ═══════════════════════════════════════
  # HEALTH CHECKS
  # ═══════════════════════════════════════

  /health:
    get:
      tags: [Health]
      summary: Basic health check
      operationId: healthCheck
      responses:
        "200":
          description: API is healthy

  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe (Kubernetes)
      operationId: liveness
      description: Returns 200 if application is alive. Does NOT check dependencies.
      responses:
        "200":
          description: Application is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe (Kubernetes)
      operationId: readiness
      description: |
        Returns 200 only if all critical dependencies are ready:
        - Database connection
        - Redis cache
        Returns 503 if any critical component is down.
        Returns 200 with `status: degraded` if non-critical components fail.
      responses:
        "200":
          description: System ready (or degraded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  timestamp:
                    type: string
                    format: date-time
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          healthy:
                            type: boolean
                          latency_ms:
                            type: number
                      cache:
                        type: object
                        properties:
                          healthy:
                            type: boolean
                          latency_ms:
                            type: number
                      redis:
                        type: object
                        properties:
                          healthy:
                            type: boolean
        "503":
          description: Critical dependency unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "unhealthy"
                  checks:
                    type: object

  /health/full:
    get:
      tags: [Health]
      summary: Detailed health check (all components)
      operationId: healthDetailed
      description: |
        Checks all system components: database, cache, redis, storage, queue.
        Returns application metrics (memory, uptime, versions).
      responses:
        "200":
          description: Detailed health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded, unhealthy]
                  app:
                    type: object
                    properties:
                      name:
                        type: string
                      environment:
                        type: string
                  checks:
                    type: object
                  summary:
                    type: object
                    properties:
                      healthy:
                        type: integer
                      total:
                        type: integer
                      percentage:
                        type: number
                  metrics:
                    type: object
                    properties:
                      uptime_seconds:
                        type: integer
                      memory_usage_mb:
                        type: number
                      peak_memory_mb:
                        type: number
                      php_version:
                        type: string
                      laravel_version:
                        type: string

  /health/db:
    get:
      tags: [Health]
      summary: Database health check
      operationId: healthDatabase
      responses:
        "200":
          description: Database is healthy
        "503":
          description: Database is down

  /health/cache:
    get:
      tags: [Health]
      summary: Cache health check
      operationId: healthCache
      responses:
        "200":
          description: Cache status (always 200, degraded is not critical)

  /health/queue:
    get:
      tags: [Health]
      summary: Queue health check
      operationId: healthQueue
      responses:
        "200":
          description: Queue status

  # ═══════════════════════════════════════
  # CONTACT
  # ═══════════════════════════════════════

  /contact:
    post:
      tags: [Contact]
      summary: Send a contact message
      operationId: sendContact
      description: |
        Public contact form. Rate limited: 3/min, 10/day per IP.
        Message is sanitized via HTML Purifier (XSS protection).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: "Alice Smith"
                email:
                  type: string
                  format: email
                  example: "alice@example.com"
                message:
                  type: string
                  maxLength: 5000
                  example: "I'd like to know about group booking rates."
      responses:
        "201":
          description: Message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: "Message received. We will get back to you soon."
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  # ═══════════════════════════════════════
  # UTILITY
  # ═══════════════════════════════════════

  /ping:
    get:
      tags: [Health]
      summary: Simple ping endpoint
      operationId: ping
      responses:
        "200":
          description: API is working
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API is working!"
                  timestamp:
                    type: string
                    format: date-time

  /auth/csrf-token:
    get:
      tags: [Authentication]
      summary: Get CSRF token
      operationId: getCsrfToken
      description: Returns a CSRF token for use with HttpOnly cookie authentication.
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrf_token:
                    type: string

  # ═══════════════════════════════════════
  # AI HARNESS
  # ═══════════════════════════════════════

  /v1/ai/{task_type}:
    post:
      tags: [AI Harness]
      summary: AI assistant handler
      operationId: aiHandle
      description: |
        Dispatch a user query to the AI harness pipeline.
        Task type determines the response pipeline (FAQ grounding, room search, booking status, admin draft).
        Gated by `ai_harness_enabled` kill switch — returns 404 when disabled.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: task_type
          in: path
          required: true
          description: AI task type
          schema:
            type: string
            enum: [faq_lookup, room_discovery, booking_status, admin_draft]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiHandleRequest"
      responses:
        "200":
          description: AI response (may include proposals for booking actions)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiHandleResponse"
        "401":
          description: Unauthenticated
        "403":
          description: Email not verified
        "404":
          description: Invalid task type or AI harness disabled (kill switch)
        "422":
          description: Invalid task type
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid task type."
        "429":
          description: Rate limit exceeded (10 req/min per user)

  /v1/ai/proposals/{hash}/decide:
    post:
      tags: [AI Harness]
      summary: Confirm or decline a booking action proposal
      operationId: aiProposalDecide
      description: |
        User confirms or declines a BookingActionProposal by its SHA-256 hash.
        On confirm: harness dispatches to existing service layer (booking creation/cancellation).
        On decline: logs rejection, returns acknowledgement.
        No model invocation — this is enforcement, not inference.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: hash
          in: path
          required: true
          description: SHA-256 proposal hash (64 hex characters)
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalDecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalDecisionResponse"
        "401":
          description: Unauthenticated
        "404":
          description: Proposal not found or expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Proposal not found or expired."
        "422":
          description: Downstream execution failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Không thể thực hiện hành động. Vui lòng thử lại."
                  errors:
                    type: object
                    properties:
                      downstream_result:
                        type: string
        "429":
          description: Rate limit exceeded

  /v1/ai/health:
    get:
      tags: [AI Harness]
      summary: AI harness health check
      operationId: aiHealthCheck
      description: |
        Returns 200 when AI_HARNESS_ENABLED=true, 404 otherwise.
        Used by kill switch procedure to verify harness is down.
        No authentication required — only gated by `ai_harness_enabled` middleware.
      responses:
        "200":
          description: AI harness is enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  enabled:
                    type: boolean
                    example: true
        "404":
          description: AI harness is disabled (kill switch active)

  # ═══════════════════════════════════════
  # DEPRECATED ENDPOINTS
  # ═══════════════════════════════════════

  /auth/login:
    post:
      deprecated: true
      tags: [Deprecated]
      summary: "[DEPRECATED] Login (use /auth/login-v2 or /auth/login-httponly)"
      operationId: loginLegacy
      description: |
        ⚠️ **DEPRECATED — Sunset: July 1, 2026**

        This endpoint still works but returns deprecation headers.
        Migrate to:
        - `/auth/login-v2` for Bearer token auth
        - `/auth/login-httponly` for cookie-based auth

        Response headers include:
        - `Deprecation: <date>`
        - `Sunset: Thu, 01 Jul 2026 00:00:00 GMT`
        - `Link: </api/auth/login-v2>; rel="successor-version"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful (with deprecation headers)
          headers:
            Deprecation:
              schema:
                type: string
              example: "Mon, 09 Feb 2026 00:00:00 GMT"
            Sunset:
              schema:
                type: string
