# Redis Production Configuration
# Persistence: AOF + RDB
# Memory: 2GB max (evict LRU when full)
# Connection pooling: 50,000 client connections

# ========== NETWORK & CONNECTION ==========
port 6379
# Docker: containers use Docker network, not localhost. Use bind 127.0.0.1 for non-Docker.
bind 0.0.0.0
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ========== PERSISTENCE (AOF + RDB) ==========
# Hybrid persistence for recovery + performance

# RDB snapshots (for crash recovery)
save 900 1
save 300 10
save 60 10000

# AOF (Append Only File) for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ========== MEMORY MANAGEMENT ==========
maxmemory 2gb
maxmemory-policy allkeys-lru

# ========== REPLICATION (optional Sentinel setup) ==========
# For production, enable master-replica replication
# replicaof <master-ip> <master-port>

# ========== LOGGING ==========
loglevel notice
logfile ""

# ========== CLIENT OUTPUT ==========
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ========== SLOW LOG ==========
slowlog-log-slower-than 10000
slowlog-max-len 128

# ========== KEYSPACE NOTIFICATIONS (for events) ==========
notify-keyspace-events "Ex"

# ========== ADVANCED SETTINGS ==========
databases 16
always-show-logo no

# ========== SECURITY ==========
# Protected mode: rejects connections from non-loopback when no password is set.
# In Docker with requirepass, this is a safety net if password becomes unset.
protected-mode yes
# requirepass — set via --requirepass flag in docker-compose.yml
# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command CONFIG ""

# ========== OPTIMIZATION ==========
hz 10
dynamic-hz yes
